<html>
<head>
    <meta charset="utf8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css?family=Open+Sans|Open+Sans+Condensed:300|Roboto" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyAT0WFWB6Hcnto0SgcGuhMb4ywp4-tXHGw",
        authDomain: "clicklogs-study.firebaseapp.com",
        projectId: "clicklogs-study",
        storageBucket: "clicklogs-study.firebasestorage.app",
        messagingSenderId: "731078032645",
        appId: "1:731078032645:web:f9ffd7682ab7b5c9f1cb6c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    var totalTouchDuration = 0;
    var tapCounter = 0;
    var startTap = 0;
    var tapLogsArray = [];
    var tapLimit = 50;
    var uniqueIdentifier = 0;
    var dependentVariable = "";
    var showFeedback = false;
    var initialShowFeedback = false;
    var interfaceVariations = 2;
    var interfaceSequence = 1;
    var sessionComplete = false;
    var isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    function onLoad() {
        var d = new Date();
        if (d.getTime() % 2 == 0) showFeedback = true;
        initialShowFeedback = showFeedback;
        uniqueIdentifier = d.getTime() + "" + Math.floor(Math.random() * 42);

        // Auto-detect platform and hide the wrong button
        if (isMobile) {
            document.getElementById("variable2").style.display = "none"; // hide PC
        } else {
            document.getElementById("variable1").style.display = "none"; // hide Android
        }

        var btn = document.getElementById('tapHere');

        // Mouse events for PC
        btn.addEventListener('mousedown', function(e) {
            e.preventDefault();
            startTap = Date.now();
        });
        btn.addEventListener('mouseup', function(e) {
            e.preventDefault();
            if (startTap > 0) recordTap(startTap, Date.now());
            startTap = 0;
        });

        // Touch events for mobile
        btn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            startTap = Date.now();
        }, { passive: false });
        btn.addEventListener('touchend', function(e) {
            e.preventDefault();
            if (startTap > 0) recordTap(startTap, Date.now());
            startTap = 0;
        }, { passive: false });
    }

    function recordTap(start, end) {
        if (sessionComplete) return;
        var duration = end - start;
        if (duration < 0 || duration > 5000) return; // ignore bad taps

        tapCounter++;
        totalTouchDuration += duration;
        var mean = Math.round(totalTouchDuration / tapCounter);

        tapLogsArray.push(JSON.stringify({
            tapSequenceNumber: tapCounter,
            startTimestamp: start,
            endTimestamp: end,
            interfaceSequence: interfaceSequence,
            interface: showFeedback ? "feedbackshown" : "nofeedback"
        }));

        // Show live feedback if in feedback mode
        if (showFeedback) {
            document.getElementById("counter").innerHTML =
                "Mean tap duration: <span class='spanTime'>" + mean + "</span> ms";
        } else {
            document.getElementById("counter").innerHTML =
                "Tap <span class='spanTime'>" + tapCounter + "</span> / 50";
        }

        // Check if round is complete
        if (tapCounter >= tapLimit) {
            document.getElementById("counter").innerHTML =
                '<span class="spanWhite">Round ' + interfaceSequence +
                ' done! Mean: <span class="spanTime">' + mean + '</span> ms</span>';

            if (interfaceSequence < interfaceVariations) {
                // Show continue button for round 2
                document.getElementById("tapHere").style.display = "none";
                document.getElementById("continue").style.display = "block";
            } else {
                // Both rounds done - save to Firestore
                sessionComplete = true;
                document.getElementById("tapHere").style.display = "none";
                document.getElementById("continue").style.display = "none";
                syncToFirestore();
            }
        }
    }

    function saveDependentVariable(dVariable) {
        dependentVariable = dVariable;
        document.getElementById("buttoncontainer").style.display = "none";
        document.getElementById("container").style.display = "inline-block";
        document.getElementById("counter").innerHTML =
            '<span class="spanWhite">Round 1 of 2 - tap 50 times</span>';
    }

    function startNext() {
        interfaceSequence = 2;
        tapCounter = 0;
        totalTouchDuration = 0;
        startTap = 0;
        showFeedback = !initialShowFeedback;
        document.getElementById("tapHere").style.display = "block";
        document.getElementById("continue").style.display = "none";
        document.getElementById("counter").innerHTML =
            '<span class="spanWhite">Round 2 of 2 - tap 50 times</span>';
    }

    async function syncToFirestore() {
        document.getElementById("counter").innerHTML =
            '<span class="spanWhite">Saving your data...</span>';
        var serverTimestamp = Date.now();
        var batch = db.batch();
        for (var i = 0; i < tapLogsArray.length; i++) {
            var tap = JSON.parse(tapLogsArray[i]);
            var docRef = db.collection('tap_logs').doc();
            batch.set(docRef, {
                sessionId:         uniqueIdentifier,
                platform:          dependentVariable.toLowerCase(),
                interfaceType:     tap.interface,
                interfaceSequence: tap.interfaceSequence,
                tapSequenceNumber: tap.tapSequenceNumber,
                startTimestamp:    tap.startTimestamp,
                endTimestamp:      tap.endTimestamp,
                durationMs:        tap.endTimestamp - tap.startTimestamp,
                serverTimestamp:   serverTimestamp
            });
        }
        try {
            await batch.commit();
            document.getElementById("container").innerHTML =
                '<span class="spanWhite">✅ Data saved successfully. Thank you!</span>';
        } catch (err) {
            console.error("Firestore error:", err);
            document.getElementById("container").innerHTML =
                '<span class="spanWhite">❌ Save failed: ' + err.message + '</span>';
        }
    }
    </script>
</head>
<body onload="onLoad()">
    <div>
        <div id="buttoncontainer">
            <button type="button" onclick="saveDependentVariable('android')" id="variable1">Android</button>
            <button type="button" onclick="saveDependentVariable('pc')" id="variable2">PC</button>
        </div>
        <div id="container" class="container">
            <div id="counter"></div>
            <div id="action"></div>
            <button id="tapHere"><img src="2x/round_touch_app_white_36dp.png"/></button>
            <button id="continue" onclick="startNext()">Continue</button>
        </div>
    </div>
</body>
</html>
